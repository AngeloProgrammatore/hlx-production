<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLX — Consulta Estoque</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f7;
            color: #1d1d1f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Login Screen */
        .login-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            width: 100%;
            padding: 20px;
        }
        .login-screen.hidden { display: none; }
        .login-box {
            background: #fff;
            border-radius: 16px;
            padding: 40px 32px;
            width: 90%;
            max-width: 380px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.06);
            text-align: center;
        }
        .login-box h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: #1d1d1f;
            margin-bottom: 6px;
        }
        .login-box .subtitle {
            color: #86868b;
            font-size: 0.85rem;
            margin-bottom: 28px;
        }
        .login-box input[type="password"] {
            width: 100%;
            padding: 13px 16px;
            font-size: 0.95rem;
            border: 1.5px solid #d2d2d7;
            border-radius: 10px;
            background: #fafafa;
            color: #1d1d1f;
            outline: none;
            transition: border-color 0.2s;
        }
        .login-box input[type="password"]:focus {
            border-color: #c8102e;
        }
        .login-box input[type="password"]::placeholder { color: #aeaeb2; }
        .login-btn {
            width: 100%;
            padding: 13px;
            margin-top: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            background: #c8102e;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover { background: #a50d25; }
        .login-error {
            color: #c8102e;
            font-size: 0.8rem;
            margin-top: 12px;
            display: none;
        }

        /* Main App */
        .app { display: none; width: 100%; }
        .app.visible { display: flex; flex-direction: column; align-items: center; }

        .header {
            padding: 28px 20px 8px;
            text-align: center;
        }
        .header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            color: #1d1d1f;
            letter-spacing: 2px;
        }
        .header p {
            color: #86868b;
            font-size: 0.82rem;
            margin-top: 4px;
        }
        .search-box {
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
        }
        .search-box input {
            width: 100%;
            padding: 13px 18px;
            font-size: 0.95rem;
            border: 1.5px solid #d2d2d7;
            border-radius: 12px;
            background: #fff;
            color: #1d1d1f;
            outline: none;
            transition: border-color 0.2s;
            box-shadow: 0 1px 4px rgba(0,0,0,0.04);
        }
        .search-box input:focus {
            border-color: #c8102e;
        }
        .search-box input::placeholder { color: #aeaeb2; }
        .hint {
            text-align: center;
            color: #aeaeb2;
            font-size: 0.78rem;
            margin-top: 6px;
        }

        /* Product Card */
        .result {
            width: 90%;
            max-width: 500px;
            margin: 16px auto;
            display: none;
        }
        .product-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 16px rgba(0,0,0,0.06);
        }
        .product-card img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            background: #fafafa;
        }
        .product-card .info { padding: 20px; }
        .product-card .product-name {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1d1d1f;
            margin-bottom: 3px;
        }
        .product-card .product-sku {
            font-size: 0.78rem;
            color: #86868b;
            margin-bottom: 16px;
        }
        .cat-badge {
            display: inline-block;
            background: #c8102e;
            color: #fff;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 0.68rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        /* Stock Grid */
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(68px, 1fr));
            gap: 8px;
        }
        .stock-item {
            background: #f5f5f7;
            border-radius: 10px;
            padding: 10px 6px;
            text-align: center;
        }
        .stock-item .size {
            font-size: 0.72rem;
            color: #86868b;
            text-transform: uppercase;
            margin-bottom: 3px;
            font-weight: 500;
        }
        .stock-item .qty { font-size: 1.15rem; font-weight: 700; }
        .qty.in-stock { color: #30a14e; }
        .qty.low-stock { color: #d4a017; }
        .qty.no-stock { color: #cf222e; }

        .total-stock {
            margin-top: 16px;
            padding-top: 12px;
            border-top: 1px solid #e8e8ed;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .total-stock .label { color: #86868b; font-size: 0.88rem; }
        .total-stock .value { font-size: 1.25rem; font-weight: 700; color: #1d1d1f; }

        .no-result {
            text-align: center;
            padding: 40px 20px;
            display: none;
        }
        .no-result .emoji { font-size: 2.2rem; margin-bottom: 10px; }
        .no-result p { color: #86868b; font-size: 0.9rem; }

        .loading {
            text-align: center;
            padding: 30px;
            display: none;
            color: #86868b;
            font-size: 0.9rem;
        }

        @media (max-width: 400px) {
            .stock-grid { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="loginScreen">
    <div class="login-box">
        <h1>HLX</h1>
        <div class="subtitle">Consulta Estoque</div>
        <input type="password" id="passInput" placeholder="Senha de acesso" autocomplete="off">
        <button class="login-btn" id="loginBtn">Entrar</button>
        <div class="login-error" id="loginError">Senha incorreta</div>
    </div>
</div>

<!-- App -->
<div class="app" id="app">
    <div class="header">
        <h1>HLX ESTOQUE</h1>
        <p>Consulta rápida de disponibilidade</p>
    </div>

    <div class="search-box">
        <input type="text" id="skuInput" placeholder="Digite o SKU ou nome do produto..." autocomplete="off">
        <div class="hint">Pesquisa por SKU, SKU Loja ou nome</div>
    </div>

    <div class="loading" id="loading">Carregando produtos...</div>

    <div class="result" id="result">
        <div class="product-card">
            <img id="productImg" src="" alt="Foto do produto">
            <div class="info">
                <span class="cat-badge" id="productCat"></span>
                <div class="product-name" id="productName"></div>
                <div class="product-sku" id="productSku"></div>
                <div class="stock-grid" id="stockGrid"></div>
                <div class="total-stock">
                    <span class="label">Estoque total</span>
                    <span class="value" id="totalStock">0</span>
                </div>
            </div>
        </div>
    </div>

    <div class="no-result" id="noResult">
        <div class="emoji">🔍</div>
        <p>Nenhum produto encontrado</p>
    </div>
</div>

<script>
    const PASS_HASH = '1e0506f294348f70f636c4ea1a684fd7699b63d68b6852dfa023746a9ae17cbf';

    async function sha256(text) {
        const data = new TextEncoder().encode(text);
        const buf = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    const loginScreen = document.getElementById('loginScreen');
    const app = document.getElementById('app');
    const passInput = document.getElementById('passInput');
    const loginBtn = document.getElementById('loginBtn');
    const loginError = document.getElementById('loginError');

    if (sessionStorage.getItem('hlx_auth') === 'ok') {
        loginScreen.classList.add('hidden');
        app.classList.add('visible');
        initApp();
    }

    passInput.focus();

    async function tryLogin() {
        const hash = await sha256(passInput.value);
        if (hash === PASS_HASH) {
            sessionStorage.setItem('hlx_auth', 'ok');
            loginScreen.classList.add('hidden');
            app.classList.add('visible');
            initApp();
        } else {
            loginError.style.display = 'block';
            passInput.value = '';
            passInput.focus();
        }
    }

    loginBtn.addEventListener('click', tryLogin);
    passInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

    let products = [];
    let debounceTimer = null;

    async function initApp() {
        document.getElementById('loading').style.display = 'block';
        try {
            const res = await fetch('/api/products');
            products = await res.json();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('skuInput').focus();
        } catch (e) {
            document.getElementById('loading').textContent = 'Erro ao carregar. Recarregue a página.';
        }
    }

    function searchProduct(query) {
        if (!query || query.length < 2) {
            document.getElementById('result').style.display = 'none';
            document.getElementById('noResult').style.display = 'none';
            return;
        }
        const q = query.toLowerCase().trim();
        const found = products.find(p => {
            if (p.sku && p.sku.toLowerCase() === q) return true;
            if (p.skuLoja && p.skuLoja.toLowerCase() === q) return true;
            if (p.sku && p.sku.toLowerCase().includes(q)) return true;
            if (p.skuLoja && p.skuLoja.toLowerCase().includes(q)) return true;
            if (p.estoqueNome && p.estoqueNome.toLowerCase().includes(q)) return true;
            if (p.venditeNome && p.venditeNome.toLowerCase().includes(q)) return true;
            return false;
        });
        if (found) {
            showProduct(found);
        } else {
            document.getElementById('result').style.display = 'none';
            document.getElementById('noResult').style.display = 'block';
        }
    }

    function showProduct(p) {
        document.getElementById('noResult').style.display = 'none';
        const img = document.getElementById('productImg');
        if (p.img) { img.src = p.img; img.style.display = 'block'; }
        else { img.style.display = 'none'; }

        document.getElementById('productCat').textContent = p.cat || '';
        document.getElementById('productName').textContent = p.estoqueNome || p.venditeNome || 'Sem nome';

        const skuParts = [];
        if (p.sku) skuParts.push('SKU: ' + p.sku);
        if (p.skuLoja) skuParts.push('SKU Loja: ' + p.skuLoja);
        document.getElementById('productSku').textContent = skuParts.join('  \u00b7  ') || 'Sem SKU';

        const grid = document.getElementById('stockGrid');
        grid.innerHTML = '';
        const stock = p.stock || {};
        let total = 0;

        const sizeOrder = ['pp','p','m','g','gg','xg','xxg','eg','eeg','2','4','6','8','10','12','14','u','unico'];
        const keys = Object.keys(stock).sort((a, b) => {
            const ia = sizeOrder.indexOf(a.toLowerCase());
            const ib = sizeOrder.indexOf(b.toLowerCase());
            if (ia === -1 && ib === -1) return a.localeCompare(b);
            if (ia === -1) return 1;
            if (ib === -1) return -1;
            return ia - ib;
        });

        keys.forEach(size => {
            const qty = parseInt(stock[size]) || 0;
            total += qty;
            const item = document.createElement('div');
            item.className = 'stock-item';
            let qtyClass = 'no-stock';
            if (qty > 5) qtyClass = 'in-stock';
            else if (qty > 0) qtyClass = 'low-stock';
            item.innerHTML = '<div class="size">' + size + '</div><div class="qty ' + qtyClass + '">' + qty + '</div>';
            grid.appendChild(item);
        });

        document.getElementById('totalStock').textContent = total;
        document.getElementById('result').style.display = 'block';
    }

    document.getElementById('skuInput').addEventListener('input', function() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => searchProduct(this.value), 300);
    });
    document.getElementById('skuInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { clearTimeout(debounceTimer); searchProduct(this.value); }
    });
</script>

</body>
</html>
